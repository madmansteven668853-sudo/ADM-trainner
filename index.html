<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DA42 Trainer v2.9 FIXED</title>

<style>
body{
    margin:0;
    font-family:-apple-system;
    color:white;
    text-align:center;
    font-size:18px;
}

/* 背景层 */
#bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;

    background-color:#2f2f2f;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.page{
    display:none;
    height:100vh;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.show{ display:flex; }

button{
    width:75%;
    padding:16px;
    margin:8px;
    font-size:18px;
    border-radius:12px;
}

#version{
    position:fixed;
    bottom:5px;
    width:100%;
    font-size:12px;
    opacity:0.5;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- MAIN -->
<div id="main" class="page show">
    <h1>DA42 TRAINER v2.9 FIXED</h1>

    <button onclick="unlockVoice()">🔊 Enable Sound</button>
    <button onclick="go('train')">Start Training</button>
    <button onclick="go('settings')">Settings</button>
    <button onclick="go('history')">History</button>
</div>

<!-- TRAIN -->
<div id="train" class="page">
    <h2>Training</h2>

    <button onclick="go('tp')">Traffic Pattern</button>
    <button onclick="go('xc')">Cross Country</button>

    <button onclick="back()">Back</button>
</div>

<!-- TP -->
<div id="tp" class="page">
    <h2>Traffic Pattern</h2>

    <input type="range" min="1" max="10" value="5" oninput="setTP(this.value)">

    <h3 id="tpTimer">05:00</h3>
    <p id="tpEvent">READY</p>

    <button onclick="start('TP')">Start</button>
    <button onclick="pause()">Pause</button>
    <button onclick="reset()">Reset</button>

    <button onclick="back()">Back</button>
</div>

<!-- XC MENU -->
<div id="xc" class="page">
    <h2>Cross Country Flight</h2>

    <button onclick="start('XC','takeoff')">Takeoff</button>
    <button onclick="start('XC','cruise')">Cruise</button>
    <button onclick="start('XC','descent')">Descent</button>
    <button onclick="start('XC','landing')">Landing</button>
    <button onclick="start('XC','final')">Final Call</button>

    <button onclick="back()">Back</button>
</div>

<!-- XC SIM -->
<div id="xcSim" class="page">
    <h2>XC SIM</h2>

    <h3 id="xcTimer">00:00</h3>
    <p id="xcEvent">READY</p>

    <button onclick="reset()">Reset</button>
    <button onclick="back()">Back</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
    <h2>Settings</h2>

    <p>Font Size</p>
    <input type="range" min="12" max="28" value="18"
        oninput="document.body.style.fontSize=this.value+'px'">

    <p>Button Size</p>
    <input type="range" min="50" max="100" value="75"
        oninput="document.querySelectorAll('button').forEach(b=>b.style.width=this.value+'%')">

    <p>Background Image</p>
    <input type="file" accept="image/*" onchange="setBackground(this)">

    <br><br>
    <button onclick="back()">Back</button>
</div>

<!-- HISTORY -->
<div id="history" class="page">
    <h2>History</h2>
    <div id="log"></div>
    <button onclick="back()">Back</button>
</div>

<div id="version">v2.9 FIXED ENGINE STABLE</div>

<script>

/* ================= BACKGROUND ================= */
function setBackground(input){

    let file=input.files[0];
    if(!file) return;

    let reader=new FileReader();

    reader.onload=function(e){

        let img=e.target.result;

        document.getElementById("bg").style.backgroundImage =
            `url("${img}")`;

        localStorage.setItem("bg", img);
    };

    reader.readAsDataURL(file);
}

window.onload=()=>{

    let bg=localStorage.getItem("bg");
    if(bg){
        document.getElementById("bg").style.backgroundImage =
            `url("${bg}")`;
    }

    speechSynthesis.onvoiceschanged=initVoice;
    initVoice();
};

/* ================= NAV ================= */
let stack=[];

function go(p){
    let cur=document.querySelector(".page.show");
    if(cur) stack.push(cur.id);

    document.querySelectorAll(".page")
        .forEach(x=>x.classList.remove("show"));

    document.getElementById(p).classList.add("show");
}

function back(){
    let p=stack.pop();
    if(!p) return;

    document.querySelectorAll(".page")
        .forEach(x=>x.classList.remove("show"));

    document.getElementById(p).classList.add("show");
}

/* ================= STATE ================= */
let mode=null;
let phase=null;
let state="IDLE";

let timer=null;
let endTime=0;

/* ================= TP ================= */
let tpMin=5;

const tpFailures=[
    "LEFT ENGINE FAILURE",
    "LEFT ENGINE FIRE",
    "RIGHT ENGINE FAILURE",
    "RIGHT ENGINE FIRE"
];

const tpCallouts=[
    "STABLE CONTINUE",
    "UNSTABLE GO AROUND"
];

/* ================= XC ================= */
const xcFailures=[
    "LEFT ENGINE FAILURE",
    "LEFT ENGINE FIRE",
    "RIGHT ENGINE FAILURE",
    "RIGHT ENGINE FIRE"
];

const xcFinalCalls=[
    "RUNWAY IN SIGHT",
    "RUNWAY NOT IN SIGHT",
    "TRAFFIC ON RUNWAY",
    "200 CHECK",
    "NO RESPONSE",
    "GO AROUND"
];

/* ================= CORE ENGINE ================= */
function start(m,p=null){

    reset();

    mode=m;
    phase=p;
    state="RUNNING";

    let duration=getDuration(m,p);
    endTime=Date.now()+duration;

    startTimer();

    if(m==="TP") scheduleTP(duration);
    if(m==="XC") scheduleXC(duration,p);

    if(m==="XC") go("xcSim");
    else go("tp");
}

function getDuration(m,p){

    if(m==="TP") return tpMin*60000;

    if(m==="XC"){
        if(p==="takeoff") return 120000;
        if(p==="cruise") return 300000;
        if(p==="descent") return 180000;
        if(p==="landing") return 120000;
        if(p==="final") return 60000;
    }

    return 60000;
}

/* ================= TIMER ================= */
function startTimer(){

    clearInterval(timer);

    timer=setInterval(()=>{

        if(state!=="RUNNING") return;

        let t=endTime-Date.now();
        if(t<=0) return;

        let m=Math.floor(t/60000);
        let s=Math.floor((t%60000)/1000);

        if(mode==="TP"){
            document.getElementById("tpTimer").innerText =
                String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
        }

        if(mode==="XC"){
            document.getElementById("xcTimer").innerText =
                String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
        }

    },500);
}

/* ================= TP ================= */
function scheduleTP(duration){

    setTimeout(()=>{

        if(state!=="RUNNING"||mode!=="TP") return;

        let f=tpFailures[Math.floor(Math.random()*tpFailures.length)];
        document.getElementById("tpEvent").innerText=f;
        speak(f);

    },10000);

    setTimeout(()=>{

        if(state!=="RUNNING"||mode!=="TP") return;

        let c=tpCallouts[Math.floor(Math.random()*tpCallouts.length)];
        document.getElementById("tpEvent").innerText=c;
        speak(c);

    },duration-30000);
}

/* ================= XC ================= */
function scheduleXC(duration,p){

    setTimeout(()=>{

        if(state!=="RUNNING"||mode!=="XC") return;

        if(p!=="final"){
            let f=xcFailures[Math.floor(Math.random()*xcFailures.length)];
            document.getElementById("xcEvent").innerText=f;
            speak(f);
        }else{
            let c=xcFinalCalls[Math.floor(Math.random()*xcFinalCalls.length)];
            document.getElementById("xcEvent").innerText=c;
            speak(c);
        }

    },10000);
}

/* ================= CONTROL ================= */
function pause(){
    state="PAUSED";
    clearInterval(timer);
}

function reset(){
    state="IDLE";
    mode=null;
    phase=null;

    clearInterval(timer);

    document.getElementById("tpTimer").innerText="00:00";
    document.getElementById("xcTimer").innerText="00:00";

    document.getElementById("tpEvent").innerText="RESET";
    document.getElementById("xcEvent").innerText="RESET";
}

/* ================= VOICE ================= */
let voiceReady=false;

function unlockVoice(){
    voiceReady=true;
    speechSynthesis.speak(new SpeechSynthesisUtterance("Sound enabled"));
}

function speak(t){
    if(!voiceReady) return;

    let u=new SpeechSynthesisUtterance(t);
    u.lang="en-US";
    u.pitch=0.8;

    speechSynthesis.cancel();
    speechSynthesis.speak(u);
}

/* ================= TP slider ================= */
function setTP(v){
    tpMin=parseInt(v);
    document.getElementById("tpTimer").innerText=v+":00";
}

</script>

</body>
</html>
